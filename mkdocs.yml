site_name: Isomer Labs
site_description: Documentation for the Isomer Labs research platform and CLI.
docs_dir: docs
site_dir: tmp/mkdocs-site
use_directory_urls: true
repo_url: https://github.com/CodeGandee/isomer-labs
repo_name: CodeGandee/isomer-labs

theme:
  name: material
  features:
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - search.highlight

plugins:
  - search

nav:
  - Home: index.md
  - Tutorials:
      - Overview: tutorial/index.md
      - Quickstart: tutorial/quickstart.md
      - Create a Project: tutorial/first-project.md
      - Author Research Intent: tutorial/author-research-intent.md
      - Prepare Topic Environment: tutorial/prepare-topic-environment.md
      - Run a Human-Steered Research Pass: tutorial/run-a-human-steered-research-pass.md
      - Validate With Real Evidence: tutorial/validate-with-real-evidence.md
      - Develop a White-Box Model: tutorial/develop-a-white-box-model.md
      - Write and Inspect a Paper: tutorial/write-and-inspect-a-paper.md
  - Manual:
      - Overview: manual/index.md
      - Concepts: manual/concepts.md
      - CLI Reference: manual/cli-reference.md
      - Project Lifecycle: manual/project-lifecycle.md
      - Research Topics: manual/research-topics.md
      - Topic Workspaces: manual/topic-workspaces.md
      - Topic Workspace Git: manual/topic-workspace-git.md
      - Workspace Runtime: manual/workspace-runtime.md
      - Research Records: manual/research-records.md
      - Research Idea Portfolio: manual/research-idea-portfolio.md
      - Project Web GUI: manual/project-web.md
      - Houmao Adapter: manual/houmao-adapter.md
      - Troubleshooting: manual/troubleshooting.md
  - Developer:
      - Overview: developer/index.md
      - Architecture: developer/architecture.md
      - Storage Layer: developer/storage-layer.md
      - Team Repositories: developer/team-repositories.md
      - Packaged System Skills: developer/packaged-system-skills.md
      - UI Contracts: developer/ui-contracts.md
      - Release Process: developer/release-process.md
      - Testing: developer/testing.md
      - Contributing to Docs: developer/contributing-docs.md
      - Assumptions and Roadmap: developer/assumptions-and-roadmap.md
  - UI Contracts:
      - Overview: ui/contracts/index.md
      - Display Paths: ui/contracts/display-paths.md
      - Topic Overview: ui/contracts/topic-overview.md
      - Topic Graph: ui/contracts/topic-graph.md
      - Research Idea Portfolio: ui/contracts/idea-portfolio.md
      - Idea Timeline: ui/contracts/idea-timeline.md
      - Idea Detail: ui/contracts/idea-detail.md
      - Research Idea Decision Context: ui/contracts/idea-decision-context.md
      - Research Idea Traversal: ui/contracts/idea-traversal.md
      - Research Idea Steering: ui/contracts/idea-steering.md
      - Record Inspection: ui/contracts/record-inspection.md
      - Diagnostics: ui/contracts/diagnostics.md
