schema_version = "isomer-user-plugin.v1"
plugin_id = "gpu-analytical-modeling"
kind = "user-skill-callback-bundle"
name = "GPU Analytical Modeling"
description = "Project-local callback skills and prompts for GPU kernel analytical modeling."
distribution = "project-local"

[install]
default_scope = "research_topic"
requires_explicit_install = true

[[callbacks]]
key = "gpu-reference/scout/begin"
target_skill = "isomer-deepsci-scout"
stage = "begin"
source_type = "skill_dir"
skill_dir = "gpu-reference-map"
description = "Choose GPU source families and source limits before scout framing."

[[callbacks]]
key = "gpu-reference/scout/end"
target_skill = "isomer-deepsci-scout"
stage = "end"
source_type = "skill_dir"
skill_dir = "gpu-reference-map"
description = "Check scout outputs for source provenance and source-to-claim boundaries."

[[callbacks]]
key = "gpu-reference/baseline/begin"
target_skill = "isomer-deepsci-baseline"
stage = "begin"
source_type = "skill_dir"
skill_dir = "gpu-reference-map"
description = "Classify baseline sources, source limits, and evidence boundaries before comparison."

[[callbacks]]
key = "gpu-reference/idea/begin"
target_skill = "isomer-deepsci-idea"
stage = "begin"
source_type = "skill_dir"
skill_dir = "gpu-reference-map"
description = "Route GPU model hypotheses to source families before source-backed claims harden."

[[callbacks]]
key = "gpu-reference/analysis/begin"
target_skill = "isomer-deepsci-analysis"
stage = "begin"
source_type = "skill_dir"
skill_dir = "gpu-reference-map"
description = "Use GPU source families and limitations while interpreting model or evidence outputs."

[[callbacks]]
key = "gpu-reference/experiment/begin"
target_skill = "isomer-deepsci-experiment"
stage = "begin"
source_type = "skill_dir"
skill_dir = "gpu-reference-map"
description = "Choose profiler, counter, measurement, and microbenchmark source boundaries before experiments."

[[callbacks]]
key = "gpu-reference/review/begin"
target_skill = "isomer-deepsci-review"
stage = "begin"
source_type = "skill_dir"
skill_dir = "gpu-reference-map"
description = "Review source provenance and source-to-claim boundaries for GPU analytical-modeling claims."

[[callbacks]]
key = "gpu-modeling-method/scout/begin"
target_skill = "isomer-deepsci-scout"
stage = "begin"
source_type = "skill_dir"
skill_dir = "gpu-modeling-method"
description = "Apply GPU source-map handoff and model-shape discipline before scout framing."

[[callbacks]]
key = "gpu-modeling-method/scout/end"
target_skill = "isomer-deepsci-scout"
stage = "end"
source_type = "skill_dir"
skill_dir = "gpu-modeling-method"
description = "Check scout outputs for model-shape, source-map handoff, and evidence-class readiness."

[[callbacks]]
key = "gpu-modeling-method/baseline/begin"
target_skill = "isomer-deepsci-baseline"
stage = "begin"
source_type = "skill_dir"
skill_dir = "gpu-modeling-method"
description = "Separate analytical, roofline, simulator, emulator, and measured baselines before acceptance."

[[callbacks]]
key = "gpu-modeling-method/idea/begin"
target_skill = "isomer-deepsci-idea"
stage = "begin"
source_type = "skill_dir"
skill_dir = "gpu-modeling-method"
description = "Require GPU model hypotheses to have explicit equations, hardware terms, and validity limits."

[[callbacks]]
key = "gpu-modeling-method/analysis/begin"
target_skill = "isomer-deepsci-analysis"
stage = "begin"
source_type = "skill_dir"
skill_dir = "gpu-modeling-method"
description = "Analyze GPU model outputs through hardware-grounded terms rather than black-box fit labels."

[[callbacks]]
key = "gpu-evidence/experiment/begin"
target_skill = "isomer-deepsci-experiment"
stage = "begin"
source_type = "skill_dir"
skill_dir = "gpu-evidence-and-experiment"
description = "Plan falsifiable GPU model evaluation with calibration, validation, and counter evidence."

[[callbacks]]
key = "gpu-evidence/experiment/end"
target_skill = "isomer-deepsci-experiment"
stage = "end"
source_type = "skill_dir"
skill_dir = "gpu-evidence-and-experiment"
description = "Check that experiment results separate real hardware from proxy evidence and explain mismatches."

[[callbacks]]
key = "gpu-evidence/analysis/end"
target_skill = "isomer-deepsci-analysis"
stage = "end"
source_type = "skill_dir"
skill_dir = "gpu-evidence-and-experiment"
description = "Require component-level and path-level bottleneck conclusions to cite matching evidence or gaps."

[[callbacks]]
key = "gpu-evidence/review/begin"
target_skill = "isomer-deepsci-review"
stage = "begin"
source_type = "skill_dir"
skill_dir = "gpu-evidence-and-experiment"
description = "Review GPU claims against runtime, counter, saturated-component, and blocking-path evidence."

[[callbacks]]
key = "gpu-evidence/decision/begin"
target_skill = "isomer-deepsci-decision"
stage = "begin"
source_type = "skill_dir"
skill_dir = "gpu-evidence-and-experiment"
description = "Route mismatched or incomplete GPU model evidence to refine, park, limit, or block."

[[callbacks]]
key = "gpu-evidence/pipeline/begin"
target_skill = "isomer-deepsci-pipeline"
stage = "begin"
source_type = "skill_dir"
skill_dir = "gpu-evidence-and-experiment"
description = "Steer multi-stage passes toward the evidence route that the GPU model currently lacks."

[[callbacks]]
key = "gpu-reporting/write/end"
target_skill = "isomer-deepsci-write"
stage = "end"
source_type = "skill_dir"
skill_dir = "gpu-reporting-and-closure"
description = "Check publication-facing GPU modeling claims, notation, and limitations before handoff."

[[callbacks]]
key = "gpu-reporting/review/end"
target_skill = "isomer-deepsci-review"
stage = "end"
source_type = "skill_dir"
skill_dir = "gpu-reporting-and-closure"
description = "Review whether central proof is visible and claim strength matches evidence class."

[[callbacks]]
key = "gpu-reporting/finalize/begin"
target_skill = "isomer-deepsci-finalize"
stage = "begin"
source_type = "skill_dir"
skill_dir = "gpu-reporting-and-closure"
description = "Prevent closure or publication when central GPU model evidence remains unsupported."

[[callbacks]]
key = "gpu-evidence/ncu-command/experiment/begin"
target_skill = "isomer-deepsci-experiment"
stage = "begin"
source_type = "prompt_file"
prompt_file = "prompts/ncu-command-posture.md"
description = "Remind experiment agents to use local Pixi and NCU command posture."

[[callbacks]]
key = "gpu-reporting/no-emulator-overclaim/write/end"
target_skill = "isomer-deepsci-write"
stage = "end"
source_type = "prompt_file"
prompt_file = "prompts/no-emulator-overclaim.md"
description = "Prevent publication-facing overclaiming from emulator, simulator, or synthetic evidence."

[[callbacks]]
key = "gpu-reporting/inline-evidence-class/finalize/end"
target_skill = "isomer-deepsci-finalize"
stage = "end"
source_type = "prompt"
prompt = "Before finalizing GPU analytical-modeling work, classify every central runtime, counter-trend, saturated-component, and blocking-path claim by evidence class. Do not close as publishable when the central claim relies only on emulator, simulator, synthetic, or analytical-proxy evidence."
description = "Inline final evidence-class reminder for closure checks."
