# Deterministic initial state for the DeepResearch platform (domain-neutral).
# Applied by `harness state init` to the single platform DB `runs/state.sqlite`. Timestamps are
# supplied at apply time. Built-in stage_catalog rows are created by schema.sql (idempotent
# INSERT OR IGNORE); this file adds DATA on top: domain stage extensions, knowledge packs, and the
# role/default TEMPLATES consumed when a quest is created.
#
# A general-purpose platform seeds NO concrete quest: quests, branches, ideas, etc. are created at
# runtime via `record apply` once a research objective is provided.

[platform]
schema_version   = 1
plan_revision    = 1
state_db         = "runs/state.sqlite"
default_locale   = "en"
max_concurrent_running_quests = 1   # enforced by invariant single_active_quest

# Default quest config templates. The quest-create record copies these into the new `quest` row
# unless the operator overrides them per objective.
[quest_defaults]
domain               = "general"
max_rounds           = 24
convergence_patience = 3            # rounds with no new admissible finding ⇒ converged
baseline_gate        = "pending"    # must reach passed|waived before write/review/finalize
execution_mode       = "auto"       # notifier-driven wakeups
run_state            = "not_started"
findings_default_scope = "quest"    # global only on explicit opt-in

# ───────────────── Role roster (distinct specialists; bound to each quest's participant rows) ─────────────────
# `tool` is the Houmao binding (claude|codex|gemini). `multi_instance`/`fan_out_max` mark roles that
# may launch K parallel instances on isolated worktrees. These are TEMPLATES, not participant rows
# (no quest exists at platform init); quest-create inserts the chosen subset into `participant`.

[[role]]
instance_id = "orchestrator"
role        = "orchestrator"
tool        = "claude"
multi_instance = false
summary     = "Owns the research state machine: stage routing, round/budget, stop-loss, decisions, self-wakeup."

[[role]]
instance_id = "scout-ideator"
role        = "scout-ideator"
tool        = "claude"
multi_instance = false
summary     = "Scope intake + baseline framing + hypothesis generation + route selection (heuristic, or records BO suggestions). Owns the scope/baseline/idea stages."

[[role]]
instance_id = "experimenter"
role        = "experimenter"
tool        = "claude"
multi_instance = true
fan_out_max = 4
summary     = "Design/implement/execute a bounded experiment in an isolated worktree."

[[role]]
instance_id = "analyst"
role        = "analyst"
tool        = "claude"
multi_instance = false
summary     = "Slice/ablate results, decompose errors, judge confirms|blocks|inconclusive."

[[role]]
instance_id = "writer"
role        = "writer"
tool        = "claude"
multi_instance = false
summary     = "Synthesize supported claims + evidence into a report/manuscript."

[[role]]
instance_id = "reviewer"
role        = "reviewer"
tool        = "claude"
multi_instance = false
summary     = "Skeptical audit of the draft; claim↔evidence coverage."

# ───────────────── Domain stage extensions (none by default) ─────────────────
# Built-in stages (scope..finalize) are seeded by schema.sql. Add domain stages here; `state init`
# applies them via INSERT OR IGNORE so they extend the catalog without schema edits. Example:
#
# [[stage]]
# stage       = "wet-lab"
# ordinal     = 45
# description = "physical bench experiment between in-silico experiment and analysis"
# is_builtin  = 0
# owning_role = "experimenter"

# ───────────────── Knowledge packs / domain adapters (none enabled by default) ─────────────────
# Domain-neutral platform ships with NO enabled adapters: experiment run / result validate /
# render * use their generic defaults. Register a pack here to override a pluggable command. Example:
#
# [[knowledge_pack]]
# pack_id  = "ml-train-runner"
# domain   = "ml"
# name     = "pytorch-train-eval"
# kind     = "runner"        # runner|validator|compiler|metric_vocab|skill|reference|template
# ref      = "packs/ml/pytorch_runner.py"
# enabled  = 1
# priority = 100             # among enabled (domain,kind), lowest priority is primary; must be unique

# ── Built-in optional extension packs (ported DeepScientist domain/publication helpers). ──
# Registered but DISABLED by default so the core platform stays domain-neutral; enable per quest/domain
# (`knowledge_pack.register ... enabled=1`) to activate the matching harness command / stage helper.
# Adapter resolution: among ENABLED packs of one (domain,kind) the lowest unique priority is primary.

[[knowledge_pack]]
pack_id = "paper-plot"
domain  = "general"
name    = "paper-plot"
kind    = "compiler"        # backs `render plot` (publication-quality plot from data, template-driven)
ref     = "execplan/packs/paper-plot"
enabled = 0
priority = 100

[[knowledge_pack]]
pack_id = "figure-polish"
domain  = "general"
name    = "figure-polish"
kind    = "compiler"        # backs `render polish` (render-inspect-revise QA on an existing figure)
ref     = "execplan/packs/figure-polish"
enabled = 0
priority = 110

[[knowledge_pack]]
pack_id = "nature-figure"
domain  = "nature"
name    = "nature-figure"
kind    = "compiler"        # backs `render figure`/`render polish` for Nature/high-impact venues (Python or R)
ref     = "execplan/packs/nature-figure"
enabled = 0
priority = 100

[[knowledge_pack]]
pack_id = "nature-paper2ppt"
domain  = "nature"
name    = "nature-paper2ppt"
kind    = "compiler"        # backs `render slides` (paper -> PPTX deck)
ref     = "execplan/packs/nature-paper2ppt"
enabled = 0
priority = 110

[[knowledge_pack]]
pack_id = "nature-data"
domain  = "nature"
name    = "nature-data"
kind    = "template"        # backs `manuscript datastmt` (Data Availability statement + FAIR metadata)
ref     = "execplan/packs/nature-data"
enabled = 0
priority = 100

[[knowledge_pack]]
pack_id = "nature-polishing"
domain  = "nature"
name    = "nature-polishing"
kind    = "template"        # backs `manuscript polish` (Nature-leaning English polishing)
ref     = "execplan/packs/nature-polishing"
enabled = 0
priority = 110

[[knowledge_pack]]
pack_id = "science-scipkg"
domain  = "science"
name    = "science-scipkg"
kind    = "reference"       # FermiLink scipkg package-card catalog; discovered via `knowledge query`
ref     = "execplan/packs/science-scipkg"
enabled = 0
priority = 100

[[knowledge_pack]]
pack_id = "mentor-standards"
domain  = "general"
name    = "mentor-standards"
kind    = "reference"       # repo-owner standards/taste read by the deepresearch-mentor skill
ref     = "execplan/packs/mentor-standards"
enabled = 0
priority = 100
