# LLM Reviewer + UCB-like acquisition config — the DeepScientist-inspired idea-level BO loop.
#
# This configures the independent `BO-reviewer` role (a surrogate evaluator that scores candidate
# research moves) and the deterministic UCB-like acquisition used by `bo select` / `bo suggest`.
#
# NO SECRETS HERE. Provider auth uses the existing per-agent credential conventions (agents/bindings.toml
# `credential=...`; see docs/credentials.md). This file only names a backend/effort and tuning knobs.
#
# The harness never shells out to a provider itself: `bo review --from-json` ingests valuations a launched
# reviewer agent produced. The deterministic OFFLINE STUB (is_stub=1) is EXPLICIT-ONLY — `bo review` /
# `bo suggest` refuse it unless `--allow-bo-stub` is passed (or DEEPRESEARCH_BO_ALLOW_STUB=1 for CI), so a
# missing credential never silently degrades to placeholder valuations. Everything is QUEST-LOCAL — the
# reviewer sees only this quest's rows; there is no cross-quest/global/sibling recall.
#
# BO-reviewer is a DEFAULT-LAUNCHED participant. Product default backend/effort below is codex/max. If codex
# is not provisioned at launch, the operator chooses (start-runbook Step 5b): (A) configure codex, or
# (B) reuse claude `default`, persisted in agents/bo-reviewer.local.toml [reviewer_override] (see bottom).

[reviewer]
backend = "codex"      # codex | claude | gemini | local | custom  (default: codex)
model   = "default"    # backend-specific model id; "default" lets the backend choose
effort  = "max"        # low | medium | high | max  (default: max)
temperature = ""        # optional; "" = backend default (only used by backends that expose it)
max_candidates = 8     # max candidates scored per `bo review` call
# Advisory-first: a reviewer pass is NOT required before `bo select` / planner actions. Set true only with a
# carefully justified optional gate — BO review/decision never block finalize and never alter idea_select.valid.
required_before_select = false

[acquisition]
# DEFAULT official DeepScientist-style score: w_u*utility + w_q*quality + kappa*exploration_value (1/1/1).
# Set method = "ucb_like_v1" for the richer Houmao exploitation/exploration/penalty formula (uses beta).
method = "ucb_official_v1"  # ucb_official_v1 (default) | ucb_like_v1 ; documented in docs/binding-gates.md
w_u    = 1.0             # official utility weight
w_q    = 1.0             # official quality weight
kappa  = 1.0             # official exploration coefficient (the UCB-like knob; higher => exploration weighed more)
beta   = 0.5            # ucb_like_v1 exploration coefficient (only used when method = "ucb_like_v1")

# ── Local / temporary override (does NOT change the product default above) ──
# When the default backend's credential is unavailable on a machine, override the EFFECTIVE backend without
# editing this product default. Precedence (low→high):
#   this file (product default) < agents/bo-reviewer.local.toml [reviewer_override] (machine-local, gitignored)
#     < DEEPRESEARCH_BO_REVIEWER_{BACKEND,EFFORT,CREDENTIAL} env < CLI --backend/--effort.
# `bo status` / `bo review` report `backend_source` (product_default | local_override_file | env_override |
# cli_override) alongside `product_default_backend`/`product_default_effort`, so the active backend is always
# auditable. Example agents/bo-reviewer.local.toml (NEVER commit it; no secrets — names a credential bundle):
#   [reviewer_override]
#   backend_override    = "claude"
#   effort_override     = "high"
#   credential_override = "default"
