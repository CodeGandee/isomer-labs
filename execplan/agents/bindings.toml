workspace = { policy_ref = "workspace.writer", work_root = "runs/<quest-id>/workspaces/writer", reads = ["runs/<quest-id>/round-*", "runs/<quest-id>/refs", "shared/objective"], writes = ["runs/<quest-id>/report"] }

