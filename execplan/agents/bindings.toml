relies_on_houmao_skills = ["houmao-agent-email-comms"]
workspace = { policy_ref = "workspace.writer", work_root = "runs/<quest-id>/workspaces/writer", reads = ["runs/<quest-id>/round-*", "runs/<quest-id>/refs", "runs/<quest-id>/objective"], writes = ["runs/<quest-id>/report"] }

[[bindings]]
participant = "reviewer"
instances = ["reviewer"]
