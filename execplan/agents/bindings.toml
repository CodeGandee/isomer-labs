# ───────────────── Independent LLM Reviewer (idea-level BO surrogate evaluator) ─────────────────
# Operationally separate from orchestrator/experimenter/analyst/writer/reviewer. Dispatched only for the
# `bo-review` stage; scores candidate research moves into bo_review valuations from QUEST-LOCAL evidence and
# replies upstream to the Orchestrator (which then runs `bo select`). Advisory — bo_review/bo_decision never
# block a gate, never alter idea_select.valid. tool=codex: the reviewer runs Codex at effort=max (default in
# agents/bo-reviewer.toml; user-overridable via `bo review --backend/--effort`). The backend/effort are passed
# in the bo-review handoff and persisted on each bo_review row. NO secrets here — provision a codex-capable
# credential for this role via houmao-credential-mgr (see docs/credentials.md); credential names a store entry.
[[bindings]]
participant = "BO-reviewer"
instances = ["BO-reviewer"]
tool = "codex"
credential = "default"
easy_profile = "deepresearch-BO-reviewer"
prompt_source = "agents/profiles/BO-reviewer/definition.md"
memo_seed = "agents/profiles/BO-reviewer/memo-seed.md"
notifier_prompt = "agents/notifier-prompts/BO-reviewer.md"
installed_skills = ["deepresearch-on-task-request", "deepresearch-llm-reviewer", "deepresearch-shared-guide"]
relies_on_houmao_skills = ["houmao-agent-email-comms"]
workspace = { policy_ref = "workspace.BO-reviewer", work_root = "runs/<quest-id>/workspaces/BO-reviewer", reads = ["runs/<quest-id>/round-*", "runs/<quest-id>/findings", "runs/<quest-id>/objective", "runs/<quest-id>/refs"], writes = ["runs/<quest-id>/workspaces/BO-reviewer"] }
