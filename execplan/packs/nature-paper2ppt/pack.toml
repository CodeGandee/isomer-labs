name = "nature-paper2ppt"
kind = "compiler"
backs = ["render slides"]
entrypoint = "adapter:render"
input_formats = ["json", "md"]
output_format = "pptx"
deps = ["python-pptx", "PyMuPDF"]
description = "Build a real Nature-style .pptx deck from a paper outline (JSON/Markdown) via python-pptx, with PDF figure extraction (PyMuPDF) and reopen/inspect QA. Degrades gracefully to a self-contained HTML deck when python-pptx is absent, and skips PDF extraction when PyMuPDF is absent."
