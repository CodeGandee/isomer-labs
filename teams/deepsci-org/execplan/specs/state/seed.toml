# Deterministic seed facts for deepsci-org loop-local bookkeeping.

[plan_metadata.loop_slug]
description = "Generated loop slug."
value = "deepsci-org"

[plan_metadata.isomer_template_layer]
description = "Execplan source layer."
value = "domain_agent_team_template"

[plan_metadata.topology_mode]
description = "Generated participant topology mode."
value = "tree-loop"

[plan_metadata.internal_root_role]
description = "Internal root role inside the Agent Team Instance."
value = "deepsci-org-master"

[default_control]
description = "Default control posture before topic specialization supplies concrete Run facts."
run_state = "not_started"
execution_mode = "manual"
control_mode = "manual"
auto_mode_requires_topic_policy = true

