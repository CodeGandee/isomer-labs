# Generated participant contract for the deepsci-mini Domain Agent Team Template.

[template]
description = "Reusable compact Domain Agent Team Template role map. Concrete Agent Instances are created only after a Topic Agent Team Profile specializes this template."
id = "deepsci-mini"
isomer_template_layer = "domain_agent_team_template"
root_role = "deepsci-mini-lead"
topology_mode = "tree-loop"
topic_instantiation_required = true
default_execution_mode = "manual"
auto_mode_requires_topic_policy = true

[[roles]]
id = "deepsci-mini-lead"
description = "Internal team root that owns routing, handoff normalization, Decisions, Gates, finalization, parking, and closure."
role_kind = "operator"
required = true
scalable = false
agent_profile_placeholder = "{deepsci_mini_lead_agent_profile_ref}"
capability_binding_placeholder = "{deepsci_mini_lead_capability_binding_ref}"
skill_projection_placeholder = "{deepsci_mini_lead_skill_projection_ref}"
required_skills = ["isomer-rsch-shared-v2", "isomer-rsch-intake-v1", "isomer-rsch-decision-v2", "isomer-rsch-finalize-v2"]
optional_skills = ["isomer-rsch-review-v1"]
hot_context = ["{research_topic_id}", "{research_inquiry_id}", "{workflow_stage_cursor_ref}", "{gate_state_ref}", "{decision_record_refs}", "{handoff_refs}", "{completion_watcher_contract_ref}", "{closure_state_ref}"]

[[roles]]
id = "deepsci-mini-scout"
description = "Collects seed-source summaries, related literature notes, benchmark or dataset context, claim candidates, and Evidence Item candidates."
role_kind = "scout"
required = true
scalable = false
agent_profile_placeholder = "{deepsci_mini_scout_agent_profile_ref}"
capability_binding_placeholder = "{deepsci_mini_scout_capability_binding_ref}"
skill_projection_placeholder = "{deepsci_mini_scout_skill_projection_ref}"
required_skills = ["isomer-rsch-shared-v2", "isomer-rsch-scout-v2"]
optional_skills = ["isomer-rsch-baseline-v2", "isomer-rsch-science-v2", "isomer-rsch-paper-outline-v1"]
hot_context = ["seed sources", "literature neighborhood", "dataset and benchmark notes", "source identity", "limitation notes", "claim candidates", "Evidence Item candidates"]

[[roles]]
id = "deepsci-mini-synth-reviewer"
description = "Clusters evidence into candidate factors, proposes follow-up inquiries, checks weak claims, and writes skeptical review notes."
role_kind = "analyst_reviewer"
required = true
scalable = false
agent_profile_placeholder = "{deepsci_mini_synth_reviewer_agent_profile_ref}"
capability_binding_placeholder = "{deepsci_mini_synth_reviewer_capability_binding_ref}"
skill_projection_placeholder = "{deepsci_mini_synth_reviewer_skill_projection_ref}"
required_skills = ["isomer-rsch-shared-v2", "isomer-rsch-idea-v2", "isomer-rsch-analysis-v2", "isomer-rsch-review-v1"]
optional_skills = ["isomer-rsch-science-v2", "isomer-rsch-paper-plot-v1"]
hot_context = ["accepted scout Artifact refs", "Evidence Item candidates", "claim candidates", "factor clusters", "weak-claim notes", "follow-up inquiry options", "review notes"]

[[stage_routes]]
workflow_stage = "intake-audit"
owner_role = "deepsci-mini-lead"
description = "Trust-rank and reconcile existing UC-01 topic state before routing."

[[stage_routes]]
workflow_stage = "scout"
owner_role = "deepsci-mini-scout"
description = "Bounded source and literature scouting that can change inquiry options."

[[stage_routes]]
workflow_stage = "literature-note"
owner_role = "deepsci-mini-scout"
description = "Extract source summaries, limitations, disagreement points, and candidate evidence."

[[stage_routes]]
workflow_stage = "synthesis-review"
owner_role = "deepsci-mini-synth-reviewer"
description = "Cluster Evidence Items, compare inquiry options, and check weak claims."

[[stage_routes]]
workflow_stage = "decision"
owner_role = "deepsci-mini-lead"
description = "Route, stop, branch, follow-up inquiry selection, reset, and user-preference decisions."

[[stage_routes]]
workflow_stage = "finalize"
owner_role = "deepsci-mini-lead"
description = "Close or park UC-01 after Gate resolution and Decision Record creation."
