# Generated harness dependency posture.
posture = "houmao-env"   # use the Houmao uv-installed environment; deps are normal Houmao runtime deps

[dependencies]
click = ">=8.1,<9"        # CLI command groups
jinja2 = ">=3.1,<4"       # .md.j2 mail rendering
jsonschema = ">=4.0,<5"   # record + email payload validation
# tomllib is stdlib (Python 3.11+).

[checks]
import_probe = "python -c 'import click, jinja2, jsonschema'"
