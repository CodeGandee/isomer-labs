# ───────────────────────────────────────────────────────────────────────────
# EXTENSION · domain-pluggable (adapter resolved from knowledge_pack; generic default otherwise)
# ───────────────────────────────────────────────────────────────────────────

[[command]]
name = "experiment run"
group = "experiment"
tier = "extension"
domain_pluggable = true
adapter_kind = "runner"
bin = "bin/experiment"
mutates_state = true
idempotent = true
reads = ["runs/state.sqlite", "../specs/workspace/workspace.toml"]
applies = ["runs/state.sqlite", "runs/<quest-id>/round-<n>/"]
summary = "Execute an experiment's run contract under the operator-confirmed GPU set (fail-closed); capture results/measurements honestly."
description = "FAIL-CLOSED GPU enforcement: refuses to run unless the quest has a confirmed gpu_allocation, and injects CUDA_VISIBLE_DEVICES=<confirmed devices> into the child process so executed code (kernels, benchmarks, ncu, generated code) is physically restricted to the confirmed set. With --cmd '<command>' [--cwd <dir>] [--timeout <s>] it runs that command under the injected env and returns rc/stdout/stderr; with no --cmd it reports the confirmed device set (stub until a knowledge_pack(kind='runner') adapter overrides it). Never invents metrics."

[[command]]
name = "result validate"
group = "experiment"
tier = "extension"
domain_pluggable = true
adapter_kind = "validator"
bin = "bin/experiment"
mutates_state = true
idempotent = true
reads = ["runs/state.sqlite"]
applies = ["runs/state.sqlite"]
summary = "Apply the domain validity gate to a result (sets result.validity)."
description = "Default adapter checks metric completeness vs the objective contract and comparability vs baseline, setting validity valid|invalid|incomparable. Domains override via knowledge_pack(kind='validator') for correctness gates (e.g. allclose, statistical significance). This is the hard gate before a result can back a supported claim or update best_result_ref."

[[command]]
name = "metric validate"
group = "experiment"
tier = "extension"
domain_pluggable = true
adapter_kind = "metric_vocab"
bin = "bin/experiment"
mutates_state = false
idempotent = true
reads = ["runs/state.sqlite"]
applies = []
summary = "Validate measurement metric_name/unit against an enabled metric vocabulary."
description = "Optional. When a knowledge_pack(kind='metric_vocab') is enabled, checks that recorded measurement names/units are known for the domain; otherwise accepts any name (fully general)."

[[command]]
name = "render report"
group = "render"
tier = "extension"
domain_pluggable = true
adapter_kind = "compiler"
bin = "bin/render"
mutates_state = true
idempotent = true
reads = ["runs/state.sqlite", "../specs/comms/templates.toml"]
applies = ["runs/state.sqlite", "runs/<quest-id>/report/"]
summary = "Render a report/manuscript from supported claims + evidence; index the artifact."
description = "Default adapter emits Markdown from supported claims, results, and references. Domains override via knowledge_pack(kind='compiler') for LaTeX/PDF or other formats. Records an artifact(kind='report'|'bundle')."

[[command]]
name = "render figure"
