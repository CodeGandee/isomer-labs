# Harness command registry — DeepResearch (general-purpose research loop).
#
# This is the loop-local deterministic command surface. Participant agents reach bookkeeping, gating,
# refinement, and rendering ONLY through these commands — never raw SQL or ad hoc state edits.
#
# Boundary (maintained Houmao skills own these; the harness must NOT):
#   - mailbox delivery / reply         -> houmao-agent-email-comms
#   - notifier enable/disable, gateway -> houmao-agent-gateway
#   - managed-agent lifecycle/launch   -> houmao-agent-instance / loop-pro execution stages
#   - memory pages                     -> houmao-memory-mgr
#   - workspace/worktree CREATION      -> houmao-utils-workspace-mgr
# The harness RECORDS intent + bookkeeping for the above and returns payloads to send; delivery is
# external. Git COMMIT/tag inside an already-created worktree is in-scope; worktree creation is not.
#
# `tier`:  "core" = domain-neutral, always present.   "extension" = domain-pluggable.
# `domain_pluggable=true` commands resolve a domain adapter from `knowledge_pack` (kind in
#   runner|validator|compiler|metric_vocab); with no enabled adapter they fall back to the generic
#   default noted per command.

[meta]
loop_slug        = "deepresearch"
registry_version = 1
state_backend    = "sqlite"
envelope         = "schemas/command-envelope.schema.json"
description      = "Deterministic harness surface: state, control, comms bookkeeping, findings, claims, self-wakeup, handoff, BO refiner, literature; plus domain-pluggable experiment/validate/render."

# Common output envelope for every command (machine-readable for agents).
[envelope]
fields = [
  "ok",            # boolean success
  "command",       # command identity, e.g. "state query"
  "quest_id",      # run id when known
  "plan_revision", # when known
  "data",          # command result payload
  "diagnostics",   # structured errors/notes
  "warnings",      # non-fatal advisories
]
explain_flag = "--explain"   # contract-exposing commands emit source-keyed descriptions
json_flag    = "--print-json"

[dependencies]
posture = "houmao-env"        # see dependency-posture.toml
click      = "CLI command groups"
jinja2     = ".md.j2 rendering (render/email)"
jsonschema = "record + email payload validation"

# ───────────────────────────────────────────────────────────────────────────
# CORE · framework control plane (domain-neutral)
# ───────────────────────────────────────────────────────────────────────────

[[command]]
name = "state init"
group = "state"
tier = "core"
domain_pluggable = false
bin = "bin/state"
mutates_state = true
idempotent = true
reads = ["../specs/state/schema.sql", "../specs/state/seed.toml"]
applies = ["runs/state.sqlite"]
summary = "Create the sqlite control plane from schema + seed for a quest."
description = "Initialize state.sqlite from ../specs/state/schema.sql and seed stage_catalog/knowledge_pack from seed.toml. Idempotent: re-init verifies an existing DB instead of overwriting."

[[command]]
name = "state validate"
group = "state"
tier = "core"
domain_pluggable = false
bin = "bin/state"
mutates_state = false
idempotent = true
reads = ["../specs/state/schema.sql", "../specs/state/invariants.toml", "runs/state.sqlite"]
applies = []
summary = "Check schema availability, referential integrity, allowed states, and named invariants."
description = "Run every check in invariants.toml (single_open_round, single_active_quest, baseline_gate_before_write, valid_backs_supported, wakeup_handoff_unique, handoff_attempts_bounded, gated_decision_confirmed, ...) plus FK/enum integrity and mail/artifact ref existence."

[[command]]
name = "state query"
group = "state"
tier = "core"
domain_pluggable = false
bin = "bin/state"
mutates_state = false
idempotent = true
reads = ["runs/state.sqlite", "../specs/state/state-overview.md"]
applies = []
summary = "Read-only scheduler/recovery views (cursor, open wakeups, due handoffs, fan-out gate, best result, convergence, claim readiness, frontier, intake)."
description = "Named views answering the state-overview scheduling queries. Views: --cursor, --open-wakeups, --due-handoffs, --fanout ROUND, --best-result, --convergence, --open-claims, --branches, --bo-observations, --frontier (optimization frontier + incumbent), --intake (audited assets by trust). Output is structured enough for a skill to decide one bounded pass."

[[command]]
name = "state export"
group = "state"
tier = "core"
domain_pluggable = false
bin = "bin/state"
mutates_state = false
idempotent = true
reads = ["runs/state.sqlite"]
applies = ["runs/<quest-id>/exports/"]
summary = "Render a compact human-readable recovery/operator view."
description = "Emit a markdown snapshot of quest posture (cursor, branches, claims, decisions, open wakeups, due handoffs) for operator inspection via houmao-agent-inspect; no live UI."

[[command]]
name = "record validate"
group = "record"
tier = "core"
domain_pluggable = false
bin = "bin/record"
mutates_state = false
idempotent = true
reads = ["../specs/state/records/*.schema.json", "../specs/state/schema.sql"]
applies = []
summary = "Validate a TOML/JSON record payload against its generated schema before apply."
description = "Schema-check a record (idea, experiment, result, measurement, analysis, claim, decision, finding, reference, branch, ...) so `record apply` stays narrow and transition-safe."

[[command]]
name = "record apply"
group = "record"
tier = "core"
domain_pluggable = false
bin = "bin/record"
mutates_state = true
idempotent = true
reads = ["../specs/state/records/*.schema.json", "runs/state.sqlite"]
applies = ["runs/state.sqlite"]
summary = "Apply a schema-valid record while preserving transition rules."
description = "The ONLY write path for agents. Enforces allowed status transitions and gated-decision rules. Idempotent by record id: re-applying the same id is a no-op, not a duplicate."

[[command]]
name = "control status"
group = "control"
tier = "core"
domain_pluggable = false
bin = "bin/control"
mutates_state = false
idempotent = true
reads = ["runs/state.sqlite", "../agents/bindings.toml"]
applies = []
summary = "Report run_state, execution_mode, active participants, pending handoffs, blockers, next action."
description = "Read-only loop posture. Observed notifier posture is reported when available but enable/disable is routed through houmao-agent-gateway."

[[command]]
name = "control get-mode"
group = "control"
tier = "core"
domain_pluggable = false
bin = "bin/control"
mutates_state = false
idempotent = true
reads = ["runs/state.sqlite"]
applies = []
summary = "Return execution_mode + source evidence; default auto."
description = "Distinguish run_state from execution_mode. Defaults to auto when no explicit mode record exists."

[[command]]
name = "control set-mode"
group = "control"
tier = "core"
domain_pluggable = false
bin = "bin/control"
mutates_state = true
idempotent = true
reads = ["runs/state.sqlite"]
applies = ["runs/state.sqlite"]
summary = "Record an execution_mode change to auto|manual (operator_intent_event)."
description = "manual is NOT paused: it suspends notifier-driven wakeups so the operator prompts bounded turns. Records an operator_intent_event(kind='set-mode')."

[[command]]
name = "control pause"
group = "control"
tier = "core"
domain_pluggable = false
bin = "bin/control"
mutates_state = true
idempotent = true
reads = ["runs/state.sqlite"]
applies = ["runs/state.sqlite"]
summary = "Record pause intent and paused run posture."
description = "Set run_state='paused' and log operator_intent_event(kind='pause'). Blocks normal progress; distinct from manual mode."

[[command]]
name = "control resume"
group = "control"
tier = "core"
domain_pluggable = false
bin = "bin/control"
mutates_state = true
idempotent = true
reads = ["runs/state.sqlite"]
applies = ["runs/state.sqlite"]
summary = "Record resume intent and continuation posture."
description = "Set run_state='running' (or 'recovering' first when open wakeups/handoffs need reconciliation) and log operator_intent_event(kind='resume')."

[[command]]
name = "control stop"
group = "control"
tier = "core"
domain_pluggable = false
bin = "bin/control"
mutates_state = true
idempotent = true
reads = ["runs/state.sqlite"]
applies = ["runs/state.sqlite"]
summary = "Record stop intent and stop posture."
description = "Set run_state='stopped' with stop_reason and log operator_intent_event(kind='stop'). A low-quality stop requires a confirmed gated decision first."

[[command]]
name = "control manual-context"
group = "control"
tier = "core"
domain_pluggable = false
bin = "bin/control"
mutates_state = false
idempotent = true
reads = ["runs/state.sqlite", "../agents/bindings.toml"]
applies = []
summary = "Return participant context for one manual-mode pass."
description = "Emit quest id, plan revision, run_state, execution_mode, participant id, pending mail/handoff refs, allowed actions, and stop_after_one_pass=true."

# Communication: bookkeeping + rendering only. Actual send/reply -> houmao-agent-email-comms.

[[command]]
name = "email schema"
group = "email"
tier = "core"
domain_pluggable = false
bin = "bin/email"
mutates_state = false
idempotent = true
reads = ["../specs/comms/templates.toml", "../specs/comms/schemas/*.schema.json"]
applies = []
summary = "Resolve a template name / schema_id to its schema + renderer paths."
description = "Maps the loop-local mail type (schema_id) to its JSON Schema and Markdown renderer for the templated families (task-request, task-result, receipt, self-wakeup, ...)."

[[command]]
name = "email validate"
group = "email"
tier = "core"
domain_pluggable = false
bin = "bin/email"
mutates_state = false
idempotent = true
reads = ["../specs/comms/schemas/*.schema.json"]
applies = []
summary = "Validate a TOML/JSON mail payload against its generated JSON Schema."
description = "Step 2 of TOML payload -> JSON Schema validation -> Markdown rendering -> Houmao delivery."

[[command]]
name = "email render"
group = "email"
tier = "core"
domain_pluggable = false
bin = "bin/email"
mutates_state = false
idempotent = true
reads = ["../specs/comms/templates.toml"]
applies = ["runs/<quest-id>/mail/"]
summary = "Render a validated payload through its Markdown (.md.j2) renderer."
description = "Produces a body containing a parseable in-body houmao-email-metadata block (carrying loop_id + handoff_id + schema_id). Delivery is performed externally via houmao-agent-email-comms."

[[command]]
name = "email apply"
group = "email"
tier = "core"
domain_pluggable = false
bin = "bin/email"
mutates_state = true
idempotent = true
reads = ["runs/state.sqlite"]
applies = ["runs/state.sqlite"]
summary = "Record mail lifecycle facts in mail_log (bookkeeping only, no delivery)."
description = "Insert/update a mail_log row (direction, schema_id, handoff_id, message_ref, status). Idempotent by payload_id. Never sends mail."

[[command]]
name = "email query"
group = "email"
tier = "core"
domain_pluggable = false
bin = "bin/email"
mutates_state = false
idempotent = true
reads = ["runs/state.sqlite", "../specs/comms/templates.toml"]
applies = []
summary = "Expose payload refs, reply expectations, and schema_id dispatch facts."
description = "Lets on-event skills map an incoming schema_id to the owning handler and find reply expectations."

# ───────────────────────────────────────────────────────────────────────────
# CORE · research domain-neutral
# ───────────────────────────────────────────────────────────────────────────

[[command]]
name = "wakeup arm"
group = "wakeup"
tier = "core"
domain_pluggable = false
bin = "bin/wakeup"
mutates_state = true
idempotent = true
reads = ["runs/state.sqlite", "../specs/comms/templates.toml"]
applies = ["runs/state.sqlite"]
summary = "Insert a self_wakeup row and return the self-mail payload to send."
description = "Records the next-step intent (next_stage, reason, next_action, fresh handoff_id) as self_wakeup(status='armed') and renders the [self-wakeup] payload. The agent sends it via houmao-agent-email-comms, then calls `wakeup attach` with the message_ref. Idempotent by handoff_id; re-arming supersedes the prior row."

[[command]]
name = "wakeup attach"
group = "wakeup"
tier = "core"
domain_pluggable = false
bin = "bin/wakeup"
mutates_state = true
idempotent = true
reads = ["runs/state.sqlite"]
applies = ["runs/state.sqlite"]
summary = "Record the opaque message_ref of a sent self-wakeup mail onto its row."
description = "Binds the delivered self-mail's message_ref to the armed self_wakeup row so recovery can correlate the open mail to its intent."

[[command]]
name = "wakeup resolve"
group = "wakeup"
tier = "core"
domain_pluggable = false
bin = "bin/wakeup"
mutates_state = true
idempotent = true
reads = ["runs/state.sqlite"]
applies = ["runs/state.sqlite"]
summary = "Transition a self_wakeup row: delivered | consumed | superseded | failed."
description = "Called when the loop wakes on a self-mail (delivered), finishes the intended work (consumed), re-plans before firing (superseded), or fails. Late delivery of a superseded/consumed handoff_id is ignored (dedup)."

[[command]]
name = "wakeup list"
group = "wakeup"
tier = "core"
domain_pluggable = false
bin = "bin/wakeup"
mutates_state = false
idempotent = true
reads = ["runs/state.sqlite"]
applies = []
summary = "List open (armed|delivered) self-wakeups for recovery."
description = "The authority for 'what does the loop intend to do next'. Used by recover/resume to rebuild intent without a fragile live turn."

[[command]]
name = "gpu status"
group = "gpu"
tier = "core"
domain_pluggable = false
bin = "bin/gpu"
mutates_state = false
idempotent = true
reads = ["runs/state.sqlite"]
applies = []
summary = "Show the operator-confirmed GPU device set for a quest (confirmed?, devices)."
description = "Read the per-quest gpu_allocation. Used by the orchestrator-tick GPU gate before dispatching experiment/analysis handoffs and by the Experimenter/Analyst to learn which CUDA_VISIBLE_DEVICES they may use."

[[command]]
name = "gpu confirm"
group = "gpu"
tier = "core"
domain_pluggable = false
bin = "bin/gpu"
mutates_state = true
idempotent = true
reads = ["runs/state.sqlite"]
applies = ["gpu.confirm"]
summary = "OPERATOR-ONLY: confirm the GPU device set a quest's GPU-using stages may use (e.g. --devices '0' or '0,1'; integer indices only)."
description = "Records gpu.confirm (status=confirmed) for the quest, satisfying the hard apply-time gate over experiment+analysis handoffs (invariant experiment_requires_gpu_confirmation) and enabling `experiment run`. devices must be a comma list of non-negative integers (schema-validated; 'all'/'-1'/empty rejected). Per-quest scope: confirm once; re-run only to change the device set. Agents must never self-confirm."

[[command]]
name = "handoff open"
group = "handoff"
tier = "core"
domain_pluggable = false
bin = "bin/handoff"
mutates_state = true
idempotent = true
reads = ["runs/state.sqlite"]
applies = ["runs/state.sqlite"]
summary = "Create/advance a handoff to 'sent' with due times; increment attempt_count."
description = "Stable (quest_id, handoff_id) ledger entry. Sets receipt_due_at/result_due_at and schema_id/roles. Reusing an existing handoff_id for a resend increments attempt_count rather than duplicating."

[[command]]
name = "handoff advance"
group = "handoff"
tier = "core"
domain_pluggable = false
bin = "bin/handoff"
mutates_state = true
idempotent = true
reads = ["runs/state.sqlite"]
applies = ["runs/state.sqlite"]
summary = "Transition a handoff: acked | result_received | processed | failed."
description = "Receivers mark progress here. Re-advancing an already 'processed' handoff_id is a dedup no-op. At attempt_count >= max_attempts the command refuses further sends and marks 'failed'."

[[command]]
name = "handoff query"
group = "handoff"
tier = "core"
domain_pluggable = false
bin = "bin/handoff"
mutates_state = false
idempotent = true
reads = ["runs/state.sqlite"]
applies = []
summary = "List due/overdue/stalled or unobserved handoffs for resend decisions and dedup checks."
description = "Supports the relay/edge-loop supervisor: --due returns handoffs not in (processed,failed); --seen HANDOFF_ID answers the receiver dedup check; --stalled --now <iso> returns in-flight (sent|acked) handoffs past their receipt/result due time with attempts remaining (action=resend) or at max_attempts (action=fail+decision) — the liveness/heartbeat reconciliation input."

[[command]]
name = "findings add"
group = "findings"
tier = "core"
domain_pluggable = false
bin = "bin/findings"
mutates_state = true
idempotent = true
reads = ["runs/state.sqlite"]
applies = ["runs/state.sqlite", "runs/<quest-id>/findings/"]
summary = "Persist a durable finding/reflexion lesson (scope defaults to quest)."
description = "Write a finding_memory row grounded by a measurement/result ref. scope='quest' by default (findings isolated per quest); scope='global' only on explicit opt-in."

[[command]]
name = "findings query"
group = "findings"
tier = "core"
domain_pluggable = false
bin = "bin/findings"
mutates_state = false
idempotent = true
reads = ["runs/state.sqlite"]
applies = []
summary = "Recall findings/reflexion for idea refinement and convergence checks."
description = "Filter by kind/scope/grounding. Default scope filter is the current quest; global recall is opt-in via --scope global."

[[command]]
name = "claim upsert"
group = "claim"
tier = "core"
domain_pluggable = false
bin = "bin/claim"
mutates_state = true
idempotent = true
reads = ["runs/state.sqlite"]
applies = ["runs/state.sqlite"]
summary = "Create/update a claim (statement + status). Convenience wrapper over `record apply --type claim.upsert`."
description = "Upserts a claim row. status open|supported|refuted|withdrawn (transition-guarded). A claim is 'supported' only with sufficient supports-evidence and no unresolved contradiction (see `evidence validate`)."

[[command]]
name = "claim resolve"
group = "claim"
tier = "core"
domain_pluggable = false
bin = "bin/claim"
mutates_state = true
idempotent = true
reads = ["runs/state.sqlite"]
applies = ["runs/state.sqlite"]
summary = "Mark a contradicting evidence link resolved/rebutted. Wrapper over `record apply --type claim_evidence.resolve`."
description = "Sets resolved=1 (+ resolution_ref) on a claim_evidence row, so an acknowledged-and-rebutted contradiction no longer blocks 'supported'."

[[command]]
name = "claim link"
group = "claim"
tier = "core"
domain_pluggable = false
bin = "bin/claim"
mutates_state = true
idempotent = true
reads = ["runs/state.sqlite"]
applies = ["runs/state.sqlite"]
summary = "Add/insert a claim, link evidence, or resolve a contradiction (result|analysis|measurement|reference|external)."
description = "Maintains claim + claim_evidence with relation supports|contradicts|contextualizes. A 'contradicts' link can later be marked resolved=1 (+ resolution_ref) to rebut it. Idempotent per (claim_id, source_kind, source_ref)."

[[command]]
name = "evidence validate"
group = "claim"
tier = "core"
domain_pluggable = false
bin = "bin/claim"
mutates_state = false
idempotent = true
reads = ["runs/state.sqlite"]
applies = []
summary = "Audit the claim↔evidence map: coverage, orphan claims, unresolved contradictions."
description = "Domain-neutral synthesis gate. A claim may be 'supported' only with sufficient supports-evidence from valid results/analyses and no contradicts link with resolved=0 (rebutted contradictions are allowed). Used by write/review."

[[command]]
name = "outline validate"
group = "manuscript"
tier = "core"
domain_pluggable = false
bin = "bin/manuscript"
mutates_state = false
idempotent = true
reads = ["runs/state.sqlite"]
applies = []
summary = "Validate an academic outline: paper idea, scoped claims, method abstraction, evaluation/analysis plan, evidence boundaries."
description = "Domain-neutral pre-write gate (DeepScientist validate_academic_outline). Checks the outline artifact has a single paper idea, claims scoped to supported evidence, a method abstraction, an evaluation+analysis plan, and explicit evidence boundaries (paper_view vs evidence_view). Used by the Writer before drafting."

[[command]]
name = "manuscript validate"
group = "manuscript"
tier = "core"
domain_pluggable = false
bin = "bin/manuscript"
mutates_state = false
idempotent = true
reads = ["runs/state.sqlite"]
applies = []
summary = "Validate manuscript-language hygiene: no route/operator/worktree/prompt wording in paper-facing prose."
description = "Domain-neutral manuscript hygiene gate (DeepScientist validate_manuscript_language). Flags loop-internal wording (route names, operator/worktree/handoff/lane/stage jargon, prompt state) that must not appear in the report/manuscript. Used by the Reviewer alongside `evidence validate`."

[[command]]
name = "bo suggest"
group = "bo"
tier = "core"
domain_pluggable = false
bin = "bin/bo"
mutates_state = false
idempotent = true
reads = ["runs/state.sqlite"]
applies = []
summary = "Propose the next point(s) over a declared search_space using observed primary measurements."
description = "Bayesian-optimization refiner. Reads search_space + completed (experiment_param, is_primary measurement) pairs and returns next candidate point(s) honoring the declared objective sense. Model/acquisition is configurable; skipped entirely when no search_space exists (heuristic refinement used instead). The caller records each suggestion as an idea/experiment with experiment_param.proposed_by='bo'."

[[command]]
name = "bo status"
group = "bo"
tier = "core"
domain_pluggable = false
bin = "bin/bo"
mutates_state = false
idempotent = true
reads = ["runs/state.sqlite"]
applies = []
summary = "Report observed best, evaluated count, and convergence posture for the search space."
description = "Feeds plateau/convergence detection: best primary objective so far, no-improvement streak vs convergence_patience."

[[command]]
name = "lit search"
group = "lit"
tier = "core"
domain_pluggable = false
bin = "bin/lit"
mutates_state = false
idempotent = true
reads = []
applies = []
summary = "Search arxiv/web for sources matching a query (no state writes)."
description = "Generic external-knowledge search. Returns candidate sources (title, uri, source); the caller chooses what to fetch. Domain-neutral and available to every quest."

[[command]]
name = "lit fetch"
group = "lit"
tier = "core"
domain_pluggable = false
bin = "bin/lit"
mutates_state = true
idempotent = true
reads = ["runs/state.sqlite"]
applies = ["runs/state.sqlite", "runs/<quest-id>/refs/"]
summary = "Fetch + cache a source and record a reference row."
description = "Caches content under runs/<quest-id>/refs/ and inserts a reference row (source, cite_key, title, uri, artifact_ref). Idempotent by uri; cross-quest cache reuse via reference.quest_id IS NULL. The caller links it to a claim via `claim link` (source_kind='reference')."

[[command]]
name = "lit query"
group = "lit"
tier = "core"
domain_pluggable = false
bin = "bin/lit"
mutates_state = false
idempotent = true
reads = ["runs/state.sqlite"]
applies = []
summary = "List/inspect recorded references and their evidence links."
description = "Read-only view over reference + claim_evidence for the Writer/Reviewer (e.g. building a references list)."

[[command]]
name = "lit bib"
group = "lit"
tier = "core"
domain_pluggable = false
bin = "bin/lit"
mutates_state = false
idempotent = true
reads = ["runs/state.sqlite"]
applies = []
summary = "Emit a BibTeX .bib from the quest's recorded reference rows (for paper-latex --bib citations)."
description = "Writer step: turns recorded `reference` rows into a .bib the manuscript cites against; `render report` (paper-latex) resolves \\cite via --bibliography. Pairs with `lit search`/`lit fetch` to build a real Related Work + bibliography."

[[command]]
name = "manuscript bundle"
group = "manuscript"
tier = "core"
domain_pluggable = false
bin = "bin/manuscript"
mutates_state = false
idempotent = true
reads = ["runs/state.sqlite"]
applies = []
summary = "Emit a DeepScientist-style submission bundle from durable state (evidence ledger + claim-evidence map + submission checklist)."
description = "Finalize/write step: from claims, claim_evidence, analyses, references, and artifacts, writes evidence_ledger.md, claim_evidence_map.json, and an auto-derived submission_checklist.md (figures present? compiled PDF present? every supported claim has evidence?). Read-only over the DB; writes files only — the publication-grade audit bundle that brings parity with the DeepScientist paper package."

# Git: commit/tag/branch-record inside an EXISTING worktree. Worktree creation -> workspace-mgr.

[[command]]
name = "git checkpoint"
group = "git"
tier = "core"
domain_pluggable = false
bin = "bin/git"
mutates_state = true
idempotent = true
reads = ["runs/state.sqlite", "../specs/workspace/workspace.toml"]
applies = ["runs/state.sqlite"]
summary = "Commit (and optionally tag) durable artifacts in the active worktree; record the artifact row."
description = "Auto-checkpoint of durable outputs into the operator-owned git workspace, then index them in the artifact table. Push is off by default. Does NOT create worktrees."

[[command]]
name = "git branch-record"
group = "git"
tier = "core"
domain_pluggable = false
bin = "bin/git"
mutates_state = true
idempotent = true
reads = ["runs/state.sqlite", "../specs/workspace/workspace.toml"]
applies = ["runs/state.sqlite"]
summary = "Record a branch/worktree ref + status in the branch table (preserve failed routes)."
description = "Registers a git branch and its (workspace-mgr-created) worktree_ref in the branch table and updates status active|parked|abandoned|merged. Materializing the worktree itself is delegated to houmao-utils-workspace-mgr."

[[command]]
name = "git status"
group = "git"
tier = "core"
domain_pluggable = false
bin = "bin/git"
mutates_state = false
idempotent = true
reads = ["../specs/workspace/workspace.toml"]
applies = []
