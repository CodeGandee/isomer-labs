mutates_state = true
idempotent = true
reads = ["runs/state.sqlite"]
applies = ["runs/state.sqlite", "runs/<quest-id>/figures/"]
summary = "Render a figure/plot from measurements; index the artifact."
description = "Default adapter produces simple plots from measurement rows. Domains override via knowledge_pack(kind='compiler'). Records an artifact(kind='figure')."

[[command]]
name = "render plot"
group = "render"
tier = "extension"
domain_pluggable = true
adapter_kind = "compiler"
bin = "bin/render"
mutates_state = true
idempotent = true
reads = ["runs/state.sqlite"]
applies = ["runs/state.sqlite", "runs/<quest-id>/figures/"]
summary = "Publication-quality plot from CSV/JSON data via the enabled compiler adapter (DeepScientist paper-plot)."
description = "Loads + calls the enabled compiler pack's adapter (paper-plot is a real stdlib SVG plotter; nature-figure for that domain). Options: --input <csv|json>, --ref <out figure path>, --title. Writes the figure to --ref and records an artifact(kind='figure'). With no enabled compiler pack it falls back to the generic stub (records the artifact, renders nothing). See packs/ADAPTER-CONTRACT.md."

