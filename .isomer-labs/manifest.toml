schema_version = "isomer-project-manifest.v1"

[defaults]
research_topic_id = "default"
topic_workspace_id = "default"

[paths]
isomer_content_root = "isomer-content"
topic_workspace_base_dir = "isomer-content/topic-ws"

[[research_topics]]
id = "default"
schema_version = "isomer-research-topic-registration.v1"
config_path = ".isomer-labs/research-topics/default.toml"
topic_workspace_id = "default"
status = "active"

[[topic_workspaces]]
id = "default"
schema_version = "isomer-topic-workspace.v1"
research_topic_id = "default"
path = "isomer-content/topic-ws/default"
status = "active"
